<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg{fill:#10131a}
      .title{fill:#f7f8fa;font:700 30px Arial, sans-serif}
      .node{fill:#1c2330;stroke:#5b6f91;stroke-width:2;rx:16}
      .t{fill:#dbe6ff;font:600 20px Arial, sans-serif}
      .s{fill:#b4c0db;font:400 16px Arial, sans-serif}
      .a{stroke:#7cb4ff;stroke-width:3;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#7cb4ff"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text class="title" x="60" y="70">Prototype Operations Loop (Client Demo)</text>

  <rect class="node" x="80" y="170" width="220" height="120"/>
  <text class="t" x="105" y="215">Lead / Inquiry</text>
  <text class="s" x="105" y="245">capture source + intent</text>

  <rect class="node" x="360" y="170" width="220" height="120"/>
  <text class="t" x="385" y="215">Guest Profile</text>
  <text class="s" x="385" y="245">contact + preferences</text>

  <rect class="node" x="640" y="170" width="220" height="120"/>
  <text class="t" x="665" y="215">Stay Setup</text>
  <text class="s" x="665" y="245">dates + status + value</text>

  <rect class="node" x="920" y="170" width="220" height="120"/>
  <text class="t" x="945" y="215">Today Ops Board</text>
  <text class="s" x="945" y="245">arrivals + alerts</text>

  <rect class="node" x="220" y="420" width="280" height="150"/>
  <text class="t" x="250" y="470">Data Quality Radar</text>
  <text class="s" x="250" y="500">missing links / dates / contact</text>

  <rect class="node" x="540" y="420" width="280" height="150"/>
  <text class="t" x="570" y="470">Action Board</text>
  <text class="s" x="570" y="500">prioritized next actions</text>

  <rect class="node" x="860" y="420" width="280" height="150"/>
  <text class="t" x="890" y="470">Export + Review</text>
  <text class="s" x="890" y="500">owner visibility + planning</text>

  <line class="a" x1="300" y1="230" x2="350" y2="230"/>
  <line class="a" x1="580" y1="230" x2="630" y2="230"/>
  <line class="a" x1="860" y1="230" x2="910" y2="230"/>
  <line class="a" x1="1030" y1="290" x2="1000" y2="410"/>
  <line class="a" x1="860" y1="495" x2="830" y2="495"/>
  <line class="a" x1="540" y1="495" x2="510" y2="495"/>
  <line class="a" x1="280" y1="420" x2="190" y2="300"/>
</svg>
